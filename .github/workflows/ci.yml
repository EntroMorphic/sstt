name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build all experiments
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make

      - name: Check AVX2 support
        run: |
          if grep -q avx2 /proc/cpuinfo; then
            echo "AVX2: supported"
          else
            echo "AVX2: not supported — using Haswell target"
          fi

      - name: Build core classifiers
        run: |
          make CFLAGS="-O2 -mavx2 -mfma -march=haswell -Wall -Wextra -Werror"

      - name: Build all experiments
        run: |
          make experiments \
               CFLAGS="-O2 -mavx2 -mfma -march=haswell -Wall -Wextra -Werror"

      - name: Verify core binaries exist
        run: |
          for bin in sstt_topo9_val sstt_bytecascade sstt_router_v1 sstt_v2 \
                     sstt_fused_test sstt_router_hardened_test \
                     sstt_diagnose sstt_validate sstt_kdilute \
                     sstt_topo sstt_topo9 sstt_topo9_val_5trit \
                     sstt_cifar10 sstt_cifar10_cascade_gauss \
                     sstt_oracle sstt_mvp sstt_geom \
                     sstt_bytepacked sstt_pentary sstt_tpca; do
            test -f "build/$bin" && echo "OK: $bin" || (echo "MISSING: $bin" && exit 1)
          done

      - name: Run fused kernel correctness test
        run: |
          make mnist MNIST_URL="https://ossci-datasets.s3.amazonaws.com/mnist"
          ./build/sstt_fused_test
